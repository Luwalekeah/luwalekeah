name: Refresh profile

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild stat and project cards
        run: python3 scripts/build_cards.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit refreshed cards
        run: |
          git config user.name "Belteshazzar Luwalekeah" && \
          git config user.email "daniel.cooke900@gmail.com" && \
          git add assets && \
          (git diff --cached --quiet || (git commit -m "Refresh profile cards" && git push))

  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Luwalekeah
          outputs: |
            dist/snake.svg?color_snake=#B45A2B&color_dots=#16222E,#2C4557,#4D7EA8,#7FA8C9,#E09B6A
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
